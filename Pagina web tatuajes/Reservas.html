    <section class="seccion-contacto">
        <div class="container text-center">
            <h2 class="titulo-contacto">Reservas</h2>
            <button class="btn-llamar">Llámanos</button>
            <p class="subtitulo-contacto">Reserva ya tu cita en nuestro estudio o ven a visitarnos a nuestro estudio</p>
        </div>

        <div class="container form-container">
            <form action="#" method="POST" class="formulario-reserva">
                <div class="form-grid-3">
                    <input type="text" name="nombre" placeholder="Nombre" required>
                    <input type="email" name="correo" placeholder="Correo" required>
                    <input type="tel" name="telefono" placeholder="Teléfono" required>
                    
                    <input type="text" name="estilo" placeholder="Estilo">
                    <input type="text" name="zona" placeholder="Zona">
                    <input type="text" name="tamano" placeholder="Tamaño en cm">
                    
                    <textarea name="mensaje" class="input-full-width" placeholder="Quiero un tatuaje..." required></textarea>
                </div>

                <div class="legal-checkbox">
                    <input type="checkbox" id="privacidad" name="privacidad" required>
                    <label for="privacidad">Acepto los avisos legales y la política de privacidad</label>
                </div>

                <button type="submit" class="btn-enviar">ENVIAR</button>
            </form>
        </div>
    </section>
